<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Профіль - Confectionery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #8b4513;">
        <div class="container">
            <a class="navbar-brand" href="/catalog.html">🍫 Confectionery</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="/catalog.html">Каталог</a>
                <a class="nav-link active" href="/profile.html">Профіль</a>
            </div>
            <button onclick="logout()" class="btn btn-outline-light btn-sm">Вийти</button>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow-sm border-0" style="max-width: 600px; margin: 0 auto;">
            <div class="card-body text-center p-5">
                <h2 class="mb-3" style="color: #8b4513;">Особистий кабінет</h2>
                <div class="alert alert-success mb-4" role="alert">
                    Ви успішно авторизовані в системі!
                </div>

                <p class="text-muted mb-3">Ваші дані сесії надійно захищені.</p>

                <button class="btn btn-outline-secondary btn-sm mb-3" type="button" data-bs-toggle="collapse" data-bs-target="#tokenContainer">
                    Показати технічний токен (Shared State)
                </button>

                <div class="collapse" id="tokenContainer">
                    <div class="card card-body bg-light border-0">
                        <code id="token-display" class="fs-6 text-break text-muted"></code>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        } else {
            document.getElementById('token-display').innerText = token;
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }
    </script>
</body>
</html>
