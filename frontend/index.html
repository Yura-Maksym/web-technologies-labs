<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід - Confectionery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow p-4" style="width: 350px; border-top: 4px solid #d2691e;">
            <h3 class="text-center mb-3" style="color: #8b4513;">🍫 Солодощі API</h3>
            <p class="text-center text-muted small mb-4">Введіть admin / 1234</p>

            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Логін">
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Пароль">
            </div>

            <button onclick="login()" class="btn w-100 text-white" style="background-color: #d2691e;">Увійти</button>
            <p id="error" class="text-danger mt-3 text-center mb-0"></p>
        </div>
    </div>

    <script>
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    window.location.href = '/catalog.html';
                } else {
                    document.getElementById('error').innerText = "Помилка авторизації!";
                }
            } catch (err) {
                document.getElementById('error').innerText = "Помилка з'єднання з сервером";
            }
        }
    </script>
</body>
</html>
