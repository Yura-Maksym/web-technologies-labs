<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Каталог - Confectionery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #8b4513;">
        <div class="container">
            <a class="navbar-brand" href="/catalog.html">🍫 Confectionery</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link active" href="/catalog.html">Каталог</a>
                <a class="nav-link" href="/profile.html">Профіль</a>
            </div>
            <button onclick="logout()" class="btn btn-outline-light btn-sm">Вийти</button>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4" style="color: #8b4513;">Список цукерок</h2>
        <div class="card shadow-sm">
            <ul id="products-list" class="list-group list-group-flush"></ul>
        </div>
    </div>

    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }

        async function loadProducts() {
            try {
                const response = await fetch('/products/');
                const products = await response.json();
                const list = document.getElementById('products-list');

                if (products.length === 0) {
                    list.innerHTML = "<li class='list-group-item text-muted'>Каталог порожній. Додайте товари через /docs</li>";
                    return;
                }

                products.forEach(p => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    li.innerHTML = `<strong>${p.name}</strong> <span class="badge rounded-pill" style="background-color: #d2691e;">${p.price} грн</span>`;
                    list.appendChild(li);
                });
            } catch (err) {
                console.error("Помилка завантаження", err);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        loadProducts();
    </script>
</body>
</html>
