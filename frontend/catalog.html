<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Каталог - Confectionery</title>
</head>
<body>
    <nav>
        <a href="/catalog.html">Каталог</a> |
        <a href="/profile.html">Профіль</a> |
        <button onclick="logout()">Вийти</button>
    </nav>

    <h1>Список цукерок</h1>
    <ul id="products-list"></ul>

    <script>
        // Перевірка стану (чи є токен)
        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }

        async function loadProducts() {
            try {
                const response = await fetch('/products/');
                const products = await response.json();
                const list = document.getElementById('products-list');

                if (products.length === 0) {
                    list.innerHTML = "<li>Каталог порожній. Додайте товари через Swagger (/docs)</li>";
                    return;
                }

                products.forEach(p => {
                    const li = document.createElement('li');
                    li.innerText = `${p.name} - ${p.price} грн`;
                    list.appendChild(li);
                });
            } catch (err) {
                console.error("Помилка завантаження", err); // Обробка помилок
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        loadProducts();
    </script>
</body>
</html>
